name: tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install coverage (dev-only test tool)
        run: pip install coverage
      - name: Run tests with coverage (min 80% em lexer/parser/emissor)
        working-directory: portugol-transpiler
        run: |
          coverage run --source=. -m pytest tests/
          coverage report -m \
            --include="*/lexer.py,*/parser.py,*/emissor.py" \
            --fail-under=80
